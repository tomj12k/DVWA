# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive;
# a hit on a `secure_source` path == false positive.
#
# Schema per entry:
#   id               stable slug for this vuln class
#   category         human-readable vulnerability class
#   cwe              primary CWE id(s)
#   owasp            OWASP Top 10 (2021) category
#   module           app-internal module/feature name
#   route            HTTP path to reach it (DAST)
#   parameter        injectable/tainted input(s) (DAST)
#   vulnerable_source source files that ARE vulnerable (SAST true-positive targets)
#   secure_source    hardened variant that is NOT vulnerable (false-positive test)
#   notes            context / caveats

app: DVWA
full_name: Damn Vulnerable Web Application
upstream: https://github.com/digininja/DVWA
fork: https://github.com/tomj12k/DVWA
language: PHP
scan_surface: [SAST-php, DAST-web]
security_levels: [low, medium, high, impossible]
catalog_notes: >
  Every module ships four source variants. low/medium/high are all exploitable
  (progressively harder). `impossible` is the intentionally hardened version and
  should NOT be flagged — use it to measure Scantonomous false positives.
  Paths below are relative to repo root.

vulns:
  - id: dvwa-sqli
    category: SQL Injection
    cwe: [CWE-89]
    owasp: A03:2021-Injection
    module: sqli
    route: /vulnerabilities/sqli/
    parameter: [id]
    vulnerable_source: [vulnerabilities/sqli/source/low.php, vulnerabilities/sqli/source/medium.php, vulnerabilities/sqli/source/high.php]
    secure_source: [vulnerabilities/sqli/source/impossible.php]

  - id: dvwa-sqli-blind
